<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 212 64" fill="none" role="img" aria-label="VEYA">
  <!-- מונוגרמה: טבעת כפולה + יהלום קטן בשעה 12 + V (לפי design handoff) -->
  <g>
    <!-- טבעת חיצונית 1.5px זהב -->
    <circle cx="32" cy="32" r="27" stroke="#C9A227" stroke-width="1.5"/>
    <!-- טבעת פנימית דקה בשקיפות ~45% -->
    <circle cx="32" cy="32" r="22.5" stroke="#C9A227" stroke-width="0.75" stroke-opacity="0.45"/>
    <!-- יהלום קטן (ריבוע מסובב) בשעה 12 -->
    <path d="M32 1.2 L35 5 L32 8.8 L29 5 Z" fill="#C9A227"/>
    <!-- אות V -->
    <text x="32" y="44" font-family="'Cormorant Garamond', Georgia, 'Times New Roman', serif"
          font-size="34" font-weight="600" fill="#E4C96B" text-anchor="middle">V</text>
  </g>
  <!-- מילת המותג -->
  <text x="74" y="42.5" font-family="'Cormorant Garamond', Georgia, 'Times New Roman', serif"
        font-size="32" font-weight="600" letter-spacing="9" fill="#F5EFE2">VEYA</text>
</svg>
